<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GG – GO GIRL · המשחקים שלנו</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --magenta: #ff2e9a;
    --purple: #c026d3;
    --violet: #a855f7;
    --ink: #1a1430;
    --muted: #7a7390;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #ffffff;
    color: var(--ink);
    font-family: 'Rubik', system-ui, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- GG top bar ---------- */
  .gg-top {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px clamp(16px, 4vw, 48px);
    background: linear-gradient(90deg, #ff2e9a, #c026d3 60%, #a855f7);
    box-shadow: 0 6px 22px -8px rgba(192, 38, 211, 0.55);
  }
  .gg-top .brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
  .gg-top .brand img {
    width: 42px; height: 42px; border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.7);
  }
  .gg-top .brand span {
    font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 18px;
    letter-spacing: 1px; color: #fff; white-space: nowrap;
  }
  .gg-top .links { display: flex; gap: 4px; margin-inline: auto; }
  .gg-top .links a {
    color: rgba(255, 255, 255, 0.9); text-decoration: none; font-weight: 600;
    font-size: 15px; padding: 8px 14px; border-radius: 10px; transition: background .2s, color .2s;
  }
  .gg-top .links a:hover { color: #fff; background: rgba(255, 255, 255, 0.18); }
  .gg-top .links a.active { color: #fff; background: rgba(255, 255, 255, 0.25); }
  .gg-top .actions { display: flex; align-items: center; gap: 10px; }
  .gg-top .soc {
    width: 38px; height: 38px; display: grid; place-items: center; border-radius: 50%;
    background: rgba(255, 255, 255, 0.16); color: #fff;
    transition: background .2s, transform .2s;
  }
  .gg-top .soc:hover { background: rgba(255, 255, 255, 0.32); transform: translateY(-2px); }
  .gg-top .soc svg { width: 18px; height: 18px; }
  .gg-top .join {
    padding: 9px 20px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 14px;
    color: var(--purple); background: #fff;
    box-shadow: 0 6px 16px -6px rgba(0, 0, 0, 0.3);
    transition: transform .2s, filter .2s;
    white-space: nowrap;
  }
  .gg-top .join:hover { transform: translateY(-2px); filter: brightness(1.02); }
  @media (max-width: 820px) {
    .gg-top .links { display: none; }
    .gg-top .brand { margin-inline-end: auto; }
  }
  @media (max-width: 520px) {
    .gg-top .soc { display: none; }
  }

  /* ---------- Page heading ---------- */
  .page-head { text-align: center; padding: clamp(34px, 6vw, 60px) 20px 0; }
  .page-head .eyebrow {
    display: inline-block; font-size: 13px; font-weight: 700; letter-spacing: 2px;
    color: var(--purple); text-transform: uppercase; margin-bottom: 8px;
  }
  .page-head h1 { font-size: clamp(30px, 5.4vw, 50px); font-weight: 800; color: var(--ink); }
  .page-head h1 .grad {
    background: linear-gradient(90deg, #ff2e9a, #a855f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .page-head p { margin-top: 10px; color: var(--muted); font-size: clamp(15px, 2.3vw, 18px); }

  /* ---------- Games grid ---------- */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 300px));
    justify-content: center;
    gap: clamp(20px, 3vw, 36px);
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: clamp(28px, 4vw, 48px) clamp(18px, 4vw, 36px) clamp(44px, 6vw, 72px);
  }
  .g-card {
    background: #fff;
    border-radius: 22px;
    padding: 14px 14px 18px;
    box-shadow: 0 12px 32px -14px rgba(80, 30, 90, 0.28), 0 2px 8px -4px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s;
  }
  .g-card:hover { transform: translateY(-6px); box-shadow: 0 24px 52px -18px rgba(192, 38, 211, 0.4); }
  .g-card .art {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 18px;
    overflow: hidden;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #ffe1f1, #e9dbff);
  }
  .g-card .art img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform .4s;
  }
  .g-card:hover .art img { transform: scale(1.05); }
  .g-card .art .fallback { font-size: clamp(46px, 9vw, 76px); line-height: 1; }
  .g-card .g-name {
    font-size: 17px; font-weight: 700; color: var(--ink);
    margin: 14px 0 12px; text-align: center;
  }
  .play-btn {
    margin-top: auto;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 26px; border-radius: 999px;
    background: linear-gradient(90deg, #ff2e9a, #c026d3);
    color: #fff; font-weight: 700; font-size: 15px; text-decoration: none;
    box-shadow: 0 8px 22px -8px rgba(255, 46, 154, 0.8);
    transition: transform .2s, filter .2s, box-shadow .3s;
  }
  .play-btn:hover { transform: translateY(-2px) scale(1.04); filter: brightness(1.07); box-shadow: 0 12px 28px -8px rgba(255, 46, 154, 0.95); }
  .play-btn .arrow { font-size: 12px; }
  .play-btn.soon {
    background: #efe9f7; color: #9b8fb3; box-shadow: none;
    cursor: default; pointer-events: none;
  }

  /* ---------- Footer ---------- */
  .gg-foot {
    margin-top: auto;
    text-align: center;
    padding: clamp(26px, 4vw, 40px) 20px clamp(30px, 4vw, 44px);
    border-top: 1px solid #f0eaf5;
    background: #faf7fd;
  }
  .gg-foot .foot-brand {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: 2px;
    text-decoration: none;
    background: linear-gradient(90deg, #ff2e9a, #a855f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .gg-foot p { color: var(--muted); font-size: 14px; margin-top: 6px; }
  .gg-foot .foot-soc { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
  .gg-foot .foot-soc a {
    width: 42px; height: 42px; display: grid; place-items: center; border-radius: 12px;
    background: #fff; border: 1px solid #ecdff4; color: var(--purple);
    transition: transform .25s, box-shadow .25s, color .25s;
  }
  .gg-foot .foot-soc a:hover { transform: translateY(-3px); color: var(--magenta); box-shadow: 0 8px 18px -6px rgba(192, 38, 211, 0.4); }
  .gg-foot .foot-soc svg { width: 20px; height: 20px; }
</style>
</head>
